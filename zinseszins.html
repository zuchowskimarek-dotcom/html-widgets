<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zinseszins-Rechner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f4ef;
    color: #1a1a18;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #ffffff;
    border-radius: 16px;
    border: 0.5px solid rgba(0,0,0,0.1);
    padding: 2rem;
    width: 100%;
    max-width: 680px;
  }

  h1 {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 0.25rem;
    color: #1a1a18;
  }

  .subtitle {
    font-size: 14px;
    color: #73726c;
    margin-bottom: 1.75rem;
    line-height: 1.5;
  }

  .ctrl {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 1rem;
  }

  .ctrl label {
    font-size: 13px;
    color: #73726c;
    min-width: 140px;
  }

  .ctrl input[type=range] {
    flex: 1;
    appearance: none;
    height: 4px;
    border-radius: 2px;
    background: #d3d1c7;
    outline: none;
    cursor: pointer;
  }

  .ctrl input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #1a1a18;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
  }

  .ctrl input[type=range]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #1a1a18;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
  }

  .val {
    font-size: 14px;
    font-weight: 500;
    min-width: 72px;
    text-align: right;
    color: #1a1a18;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 1.5rem 0;
  }

  .metric {
    background: #f5f4ef;
    border-radius: 10px;
    padding: 0.75rem 1rem;
  }

  .mlabel {
    font-size: 11px;
    color: #73726c;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .mval {
    font-size: 17px;
    font-weight: 500;
    color: #1a1a18;
  }

  .mval.green { color: #0F6E56; }

  .chart-wrap {
    position: relative;
    width: 100%;
    height: 280px;
    margin-top: 0.5rem;
  }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 12px;
    font-size: 12px;
    color: #73726c;
  }

  .legend span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .rule72 {
    margin-top: 1.25rem;
    padding: 0.75rem 1rem;
    background: #E1F5EE;
    border-radius: 10px;
    font-size: 13px;
    color: #085041;
    line-height: 1.5;
  }

  .rule72 strong { font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <h1>Zinseszins-Rechner</h1>
  <p class="subtitle">Zinsen werden dem Kapital hinzugefügt — im nächsten Jahr verdient man auch auf die Zinsen Zinsen.</p>

  <div class="ctrl">
    <label>Startkapital</label>
    <input type="range" id="principal" min="1000" max="100000" step="1000" value="10000">
    <span class="val" id="pOut">10.000 €</span>
  </div>
  <div class="ctrl">
    <label>Zinssatz / Jahr</label>
    <input type="range" id="rate" min="1" max="15" step="0.5" value="7">
    <span class="val" id="rOut">7,0 %</span>
  </div>
  <div class="ctrl">
    <label>Laufzeit</label>
    <input type="range" id="years" min="1" max="40" step="1" value="20">
    <span class="val" id="yOut">20 Jahre</span>
  </div>

  <div class="metrics">
    <div class="metric"><div class="mlabel">Startkapital</div><div class="mval" id="mPrincipal">10.000 €</div></div>
    <div class="metric"><div class="mlabel">Endwert</div><div class="mval green" id="mFinal">—</div></div>
    <div class="metric"><div class="mlabel">Gewinn</div><div class="mval green" id="mGain">—</div></div>
  </div>

  <div class="legend">
    <span><span class="legend-dot" style="background:#1D9E75;"></span>Zinseszins</span>
    <span><span class="legend-dot" style="background:#378ADD; opacity:0.7;"></span>Einfacher Zins</span>
    <span><span class="legend-dot" style="background:#888780;"></span>Startkapital</span>
  </div>

  <div class="chart-wrap">
    <canvas id="cc"></canvas>
  </div>

  <div class="rule72" id="rule72"></div>
</div>

<script>
  const fmtFull = v => new Intl.NumberFormat('de-DE', {style:'currency', currency:'EUR', maximumFractionDigits:0}).format(v);
  const fmtK = v => v >= 1000 ? (v/1000).toFixed(0)+'K €' : v.toFixed(0)+' €';

  let chart;

  function getData() {
    const P = +document.getElementById('principal').value;
    const r = +document.getElementById('rate').value / 100;
    const Y = +document.getElementById('years').value;
    const labels=[], compound=[], simple=[], principal=[];
    for (let y=0; y<=Y; y++) {
      labels.push(y === 0 ? 'Start' : 'Jahr '+y);
      principal.push(Math.round(P));
      simple.push(Math.round(P * (1 + r*y)));
      compound.push(Math.round(P * Math.pow(1+r, y)));
    }
    return {P, r, Y, labels, compound, simple, principal};
  }

  function update() {
    const {P, r, Y, labels, compound, simple, principal} = getData();
    const final = compound[Y];
    const gain = final - P;
    const rPct = (+document.getElementById('rate').value).toFixed(1);
    const doublingYears = Math.round(72 / (+document.getElementById('rate').value));

    document.getElementById('pOut').textContent = fmtFull(P);
    document.getElementById('rOut').textContent = rPct.replace('.',',')+' %';
    document.getElementById('yOut').textContent = Y+' Jahre';
    document.getElementById('mPrincipal').textContent = fmtFull(P);
    document.getElementById('mFinal').textContent = fmtFull(final);
    document.getElementById('mGain').textContent = '+'+fmtFull(gain);
    document.getElementById('rule72').innerHTML =
      '<strong>Verdopplungsregel (72er-Regel):</strong> Bei '+rPct.replace('.',',')+' % Zinsen verdoppelt sich das Kapital alle ca. <strong>'+doublingYears+' Jahre</strong>.';

    if (chart) {
      chart.data.labels = labels;
      chart.data.datasets[0].data = compound;
      chart.data.datasets[1].data = simple;
      chart.data.datasets[2].data = principal;
      chart.update('none');
    } else {
      chart = new Chart(document.getElementById('cc'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {label:'Zinseszins', data:compound, borderColor:'#1D9E75', backgroundColor:'rgba(29,158,117,0.08)', fill:true, tension:0.35, pointRadius:0, borderWidth:2.5},
            {label:'Einfacher Zins', data:simple, borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.05)', fill:true, tension:0, pointRadius:0, borderWidth:1.5, borderDash:[5,4]},
            {label:'Startkapital', data:principal, borderColor:'#888780', borderWidth:1, borderDash:[3,3], pointRadius:0, fill:false}
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {mode:'index', intersect:false},
          plugins: {
            legend: {display:false},
            tooltip: {callbacks:{label: ctx => ' '+ctx.dataset.label+': '+fmtFull(ctx.raw)}}
          },
          scales: {
            x: {grid:{color:'rgba(0,0,0,0.06)'}, ticks:{font:{size:11}, color:'#888780', maxTicksLimit:8, autoSkip:true}},
            y: {grid:{color:'rgba(0,0,0,0.06)'}, ticks:{font:{size:11}, color:'#888780', callback: v => fmtK(v)}}
          }
        }
      });
    }
  }

  ['principal','rate','years'].forEach(id => document.getElementById(id).addEventListener('input', update));
  update();
</script>
</body>
</html>
